syntax = "proto3";

package wraith;

enum MessageType {
    REGISTRATION = 0;
    HEARTBEAT = 1;
    COMMAND = 2;
    COMMAND_RESULT = 3;
    RELAY_CREATE = 4;
    RELAY_DELETE = 5;
    RELAY_LIST = 6;
    RELAY_LIST_RESPONSE = 7;
    WRAITH_REGISTRATION = 8;
    PEER_UPDATE = 9;
    PEER_LIST = 10;
    PEER_LIST_RESPONSE = 11;
}

message WraithMessage {
    MessageType msg_type = 1;
    string message_id = 2;
    int64 timestamp = 3;
    oneof payload {
        Registration registration = 4;
        Heartbeat heartbeat = 5;
        Command command = 6;
        CommandResult result = 7;
        RelayCreate relay_create = 8;
        RelayDelete relay_delete = 9;
        RelayList relay_list = 10;
        RelayListResponse relay_list_response = 11;
        WraithRegistration wraith_registration = 12;
        PeerUpdate peer_update = 13;
        PeerList peer_list = 14;
        PeerListResponse peer_list_response = 15;
    }
}

message Registration {
    string hostname = 1;
    string username = 2;
    string os = 3;
    string ip_address = 4;
}

message Heartbeat {
    int64 last_command_time = 1;
    string status = 2;
}

message Command {
    string command_id = 1;
    string action = 2;
    map<string, string> params = 3;
    int32 timeout = 4;
}

message CommandResult {
    string command_id = 1;
    string status = 2;
    string output = 3;
    int32 exit_code = 4;
    int64 duration_ms = 5;
    string error = 6;
}

message RelayEndpoint {
    string host = 1;
    int32 port = 2;
    string protocol = 3;  // "tcp" or "udp"
}

message RelayConfig {
    RelayEndpoint listen = 1;
    RelayEndpoint forward = 2;
}

message RelayCreate {
    string relay_id = 1;
    RelayConfig config = 2;
}

message RelayDelete {
    string relay_id = 1;
}

message RelayList {}

message RelayListResponse {
    repeated RelayInfo relays = 1;
}

message RelayInfo {
    string relay_id = 1;
    string listen_host = 2;
    int32 listen_port = 3;
    string forward_host = 4;
    int32 forward_port = 5;
    bool active = 6;
}

// Wraith-to-Wraith Registration
message WraithRegistration {
    string wraith_id = 1;
    string hostname = 2;
    string os = 3;
    int64 connected_at = 4;
}

// Peer list/management
message PeerInfo {
    string wraith_id = 1;
    string hostname = 2;
    bool connected = 3;
}

message PeerList {}

message PeerListResponse {
    string wraith_id = 1;
    repeated PeerInfo peers = 2;
}

message PeerUpdate {
    string wraith_id = 1;
    string hostname = 2;
    string action = 3;  // "connected" or "disconnected"
    int64 timestamp = 4;
}